<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天鹰座裂隙</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/screens.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-rank.css">
    <link rel="stylesheet" href="style-enhance.css">
    <link rel="stylesheet" href="style-carousel.css">
    <link rel="stylesheet" href="style-gacha.css">
    <link rel="stylesheet" href="style-hangar.css">
    <link rel="stylesheet" href="style-inventory.css">
    <link rel="stylesheet" href="style-constellation.css">
</head>
<body>
    <canvas id="game-canvas"></canvas>
    <div class="combo-display" id="combo-display">
        <div class="combo-count">0</div>
        <div class="combo-text">COMBO</div>
    </div>
    <div class="buff-display" id="buff-display"></div>
    <div class="hp-display" id="hp-display"></div>
    
    <!-- 主菜单 -->
    <div class="start-screen" id="start-screen">
        <h1>天鹰座裂隙</h1>
        <div class="menu-buttons">
            <button id="start-btn">开始游戏</button>
            <button id="inventory-btn">🎒 背包</button>
            <button id="upgrade-btn">机库升级</button>
            <button id="ship-btn">飞机商店</button>
            <button id="gacha-btn">🎰 扭蛋机</button>
        </div>
    </div>
    
    <!-- 背包界面 (动态生成) -->
    <div class="inventory-screen hidden" id="inventory-screen"></div>

    <!-- 机库升级 (动态生成) -->
    <div class="upgrade-screen hidden" id="upgrade-screen"></div>

    <!-- 飞机故事 (动态生成) -->
    <div class="story-screen hidden" id="story-screen"></div>

    <!-- 抽卡商店 (动态生成) -->
    <div class="gacha-screen hidden" id="gacha-screen"></div>
    
    <!-- 飞机商店 (动态生成) -->
    <div class="ship-screen hidden" id="ship-screen"></div>
    
    <script type="module" src="js/main.js"></script>
</body>
</html>
