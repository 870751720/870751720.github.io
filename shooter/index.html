<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天鹰座裂隙</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-rank.css">
    <link rel="stylesheet" href="style-enhance.css">
    <link rel="stylesheet" href="style-carousel.css">
    <link rel="stylesheet" href="style-gacha.css">
    <link rel="stylesheet" href="style-hangar.css">
    <link rel="stylesheet" href="style-inventory.css">
    <link rel="stylesheet" href="style-constellation.css">
</head>
<body>
    <canvas id="game-canvas"></canvas>
    <div class="combo-display" id="combo-display">
        <div class="combo-count">0</div>
        <div class="combo-text">COMBO</div>
    </div>
    <div class="buff-display" id="buff-display"></div>
    <div class="hp-display" id="hp-display"></div>
    <div class="game-score" id="game-score">SCORE: 0</div>
    
    <!-- 主菜单 -->
    <div class="start-screen" id="start-screen">
        <h1>天鹰座裂隙</h1>
        <div class="menu-buttons">
            <button id="start-btn">开始游戏</button>
            <button id="inventory-btn">🎒 背包</button>
            <button id="upgrade-btn">机库升级</button>
            <button id="ship-btn">飞机商店</button>
            <button id="gacha-btn">🎰 扭蛋机</button>
        </div>
    </div>
    
    <!-- 背包界面 -->
    <div class="inventory-screen hidden" id="inventory-screen">
        <!-- 内容由JS生成 -->
    </div>

    <!-- 升级商店 -->
    <div class="upgrade-screen hidden" id="upgrade-screen">
        <h2>机库升级</h2>
        <div class="upgrade-coins">💰 <span id="upgrade-coin-display">0</span></div>
        
        <!-- 功能入口 -->
        <div class="upgrade-entries">
            <button id="constellation-entry" class="upgrade-entry-btn">
                <span class="entry-icon">⭐</span>
                <span class="entry-text">命座提升</span>
            </button>
            <button id="story-entry" class="upgrade-entry-btn">
                <span class="entry-icon">📖</span>
                <span class="entry-text">飞机故事</span>
            </button>
        </div>
        
        <div class="upgrade-grid" id="upgrade-grid">
            <!-- 升级项目由JS生成 -->
        </div>
        <div class="menu-buttons-row">
            <button id="to-ship-btn" class="secondary-btn">飞机商店</button>
            <button id="to-gacha-btn" class="secondary-btn">🎰 扭蛋机</button>
            <button id="back-btn" class="back-btn">返回主菜单</button>
        </div>
    </div>

    <!-- 命座提升界面 -->
    <div class="constellation-screen hidden" id="constellation-screen">
        <h2>⭐ 命座提升</h2>
        <div class="constellation-coins">💰 <span id="constellation-coin-display">0</span></div>
        <div class="constellation-container" id="constellation-container">
            <!-- 命座内容由JS生成 -->
        </div>
        <div class="menu-buttons-row">
            <button id="constellation-back-btn" class="back-btn">返回机库</button>
        </div>
    </div>

    <!-- 飞机故事界面 -->
    <div class="story-screen hidden" id="story-screen">
        <h2>📖 飞机故事</h2>
        <div class="story-container" id="story-container">
            <!-- 故事内容由JS生成 -->
        </div>
        <div class="menu-buttons-row">
            <button id="story-back-btn" class="back-btn">返回机库</button>
        </div>
    </div>

    <!-- 抽卡商店 -->
    <div class="gacha-screen hidden" id="gacha-screen">
        <div class="gacha-container" id="gacha-container">
            <!-- 内容由JS生成 -->
        </div>
        <div class="menu-buttons-row">
            <button id="gacha-to-ship-btn" class="secondary-btn">飞机商店</button>
            <button id="gacha-to-upgrade-btn" class="secondary-btn">机库升级</button>
            <button id="gacha-back-btn" class="back-btn">返回主菜单</button>
        </div>
    </div>
    
    <!-- 飞机商店 -->
    <div class="ship-screen hidden" id="ship-screen">
        <h2>飞机商店</h2>
        <div class="ship-header">
            <div class="ship-coins">💰 <span id="ship-coin-display">0</span></div>
        </div>
        <div class="ship-carousel-container">
            <button class="carousel-nav prev" id="ship-prev">◀</button>
            <div class="ship-carousel" id="ship-grid">
                <!-- 飞机由JS生成 -->
            </div>
            <button class="carousel-nav next" id="ship-next">▶</button>
        </div>
        <div class="carousel-dots" id="carousel-dots"></div>
        <div class="menu-buttons-row">
            <button id="ship-back-btn" class="back-btn">返回主菜单</button>
        </div>
    </div>
    
    <script type="module" src="js/main.js"></script>
</body>
</html>
