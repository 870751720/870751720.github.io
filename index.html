<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贺加文 - 游戏开发工程师</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'VT323', 'Courier New', monospace;
            padding: 20px;
            image-rendering: pixelated;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
        }
        
        /* 顶部角色卡 */
        .hero-card {
            background: #252542;
            border: 4px solid #3d3d6b;
            box-shadow: 
                0 0 0 4px #1a1a2e,
                8px 8px 0 rgba(0,0,0,0.4);
            padding: 30px;
            margin-bottom: 20px;
            position: relative;
        }
        
        .hero-card::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            background: linear-gradient(135deg, #6b5ce7 0%, transparent 50%, #3d3d6b 100%);
            z-index: -1;
            opacity: 0.3;
        }
        
        .character-row {
            display: flex;
            gap: 25px;
            align-items: flex-start;
        }
        
        /* 像素头像 */
        .avatar-container {
            position: relative;
            flex-shrink: 0;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            background: #f5f5f0;
            border: 4px solid #d4d4d0;
            box-shadow: 
                4px 4px 0 #999,
                inset -4px -4px 0 rgba(255,255,255,0.8),
                inset 4px 4px 0 rgba(0,0,0,0.1);
            position: relative;
            image-rendering: pixelated;
        }
        
        /* 骰子点 - 6点布局 左列3个 */
        .avatar::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 22px;
            width: 14px;
            height: 14px;
            background: #333;
            border-radius: 50%;
            box-shadow: 
                0 38px 0 #333,
                0 76px 0 #333;
        }
        
        /* 骰子右列3个点 */
        .avatar::after {
            content: '';
            position: absolute;
            top: 15px;
            right: 22px;
            width: 14px;
            height: 14px;
            background: #333;
            border-radius: 50%;
            box-shadow: 
                0 38px 0 #333,
                0 76px 0 #333;
        }
        
        .level-badge {
            position: absolute;
            bottom: -10px;
            right: -10px;
            background: #6b5ce7;
            color: #fff;
            padding: 5px 12px;
            font-size: 18px;
            border: 3px solid #9d8df7;
            box-shadow: 3px 3px 0 #1a1520;
        }
        
        .info-section {
            flex: 1;
        }
        
        .name {
            font-size: 42px;
            color: #fff;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 10px;
            letter-spacing: 0.1em;
        }
        
        .title {
            font-size: 20px;
            color: #9d8df7;
            margin-bottom: 15px;
        }
        
        .title::before {
            content: '► ';
            color: #6b5ce7;
        }
        
        .location {
            font-size: 16px;
            color: #a8a8c4;
        }
        
        .location span {
            color: #6b5ce7;
        }
        
        /* 状态条区域 */
        .stats-section {
            margin-top: 25px;
        }
        
        .stat-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 18px;
        }
        
        .stat-label {
            width: 80px;
            color: #9d8df7;
        }
        
        .stat-bar {
            flex: 1;
            height: 24px;
            background: #151525;
            border: 2px solid #3d3d5c;
            position: relative;
        }
        
        .stat-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560 0%, #ff6b6b 100%);
            position: relative;
            transition: width 1s ease;
        }
        
        .stat-fill.hp { width: 88%; background: linear-gradient(90deg, #c45c5c 0%, #e87e7e 100%); }
        .stat-fill.mp { width: 99%; background: linear-gradient(90deg, #3a6b8b 0%, #5c9bc4 100%); }
        .stat-fill.exp { width: 66%; background: linear-gradient(90deg, #6b5ce7 0%, #9d8df7 100%); }
        
        .stat-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 10px,
                rgba(0,0,0,0.2) 10px,
                rgba(0,0,0,0.2) 20px
            );
        }
        
        .stat-value {
            width: 60px;
            text-align: right;
            color: #fff;
            margin-left: 10px;
        }
        
        /* 信息框 */
        .info-box {
            background: #252542;
            border: 3px solid #6b5ce7;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.3);
        }
        
        .info-header {
            color: #9d8df7;
            font-size: 20px;
            margin-bottom: 15px;
            border-bottom: 2px dashed #6b5ce7;
            padding-bottom: 10px;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 18px;
            color: #fff;
        }
        
        .info-icon {
            width: 24px;
            text-align: center;
            margin-right: 12px;
        }
        
        .heart { color: #e87e7e; }
        .diamond { color: #6b5ce7; }
        .star { color: #9d8df7; }
        
        /* 技能列表 */
        .skills-box {
            background: #252542;
            border: 3px solid #9d8df7;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.3);
        }
        
        .skills-header {
            color: #9d8df7;
            font-size: 20px;
            margin-bottom: 15px;
            border-bottom: 2px dashed #9d8df7;
            padding-bottom: 10px;
        }
        
        .skill-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 16px;
        }
        
        .skill-name {
            color: #fff;
            width: 120px;
        }
        
        .skill-level {
            display: flex;
            gap: 3px;
        }
        
        .skill-dot {
            width: 12px;
            height: 12px;
            background: #333;
            border: 1px solid #666;
        }
        
        .skill-dot.filled {
            background: #9d8df7;
            border-color: #9d8df7;
            box-shadow: 0 0 5px #9d8df7;
        }
        
        /* 联系区域 */
        .contact-box {
            background: #252542;
            border: 3px solid #9d8df7;
            padding: 20px;
            text-align: center;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.3);
        }
        
        .contact-header {
            color: #9d8df7;
            font-size: 20px;
            margin-bottom: 15px;
        }
        
        .contact-wechat {
            font-size: 24px;
            color: #9d8df7;
            text-shadow: 2px 2px 0 #151525;
        }
        
        .contact-hint {
            font-size: 14px;
            color: #7a7a9a;
            margin-top: 10px;
        }
        
        /* 闪烁动画 */
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
        
        .blink {
            animation: blink 1s infinite;
        }
        
        /* 光标效果 */
        .cursor::after {
            content: '_';
            animation: blink 0.8s infinite;
        }
        
        /* 响应式 */
        @media (max-width: 500px) {
            .character-row {
                flex-direction: column;
                align-items: center;
            }
            
            .name {
                font-size: 32px;
                text-align: center;
            }
            
            .info-section {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 角色卡 -->
        <div class="hero-card">
            <div class="character-row">
                <div class="avatar-container">
                    <div class="avatar"></div>
                    <div class="level-badge">Lv.--</div>
                </div>
                <div class="info-section">
                    <h1 class="name cursor">贺加文</h1>
                    <div class="title">游戏开发工程师</div>
                    <div class="location">
                        <span>♦</span> 网易游戏
                    </div>
                </div>
            </div>
            
            <!-- 状态条 -->
            <div class="stats-section">
                <div class="stat-row">
                    <span class="stat-label">HP</span>
                    <div class="stat-bar">
                        <div class="stat-fill hp"></div>
                    </div>
                    <span class="stat-value">88/100</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">MP</span>
                    <div class="stat-bar">
                        <div class="stat-fill mp"></div>
                    </div>
                    <span class="stat-value">99/100</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">EXP</span>
                    <div class="stat-bar">
                        <div class="stat-fill exp"></div>
                    </div>
                    <span class="stat-value">66%</span>
                </div>
            </div>
        </div>
        
        <!-- 个人介绍 -->
        <div class="info-box">
            <div class="info-header">► 个人介绍</div>
            <div class="info-item" style="justify-content: center; font-style: italic; color: #b8b8d0;">
                不过是些许风霜罢了
            </div>
        </div>
        
        <!-- 技能 -->
        <div class="skills-box">
            <div class="skills-header">► 技能树</div>
            <div class="skill-item">
                <span class="skill-name">Messiah引擎</span>
                <div class="skill-level">
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot"></div>
                </div>
            </div>
            <div class="skill-item">
                <span class="skill-name">C++</span>
                <div class="skill-level">
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot"></div>
                </div>
            </div>
            <div class="skill-item">
                <span class="skill-name">Python</span>
                <div class="skill-level">
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot"></div>
                </div>
            </div>
            <div class="skill-item">
                <span class="skill-name">寻路生成</span>
                <div class="skill-level">
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                </div>
            </div>
        </div>
        
        <!-- 联系方式 -->
        <div class="contact-box">
            <div class="contact-header">► 建立连接</div>
            <div class="contact-wechat">微信: 17691083667</div>
            <div class="contact-hint">加为好友发起会话... <span class="blink">▋</span></div>
        </div>
    </div>
    
    <script>
        // 生日: 9月7日
        const birthYear = 1996;
        const birthMonth = 9;  // 9月
        const birthDay = 7;    // 7日
        
        const now = new Date();
        let age = now.getFullYear() - birthYear;
        
        // 判断是否过了今年生日
        const thisYearBirthday = new Date(now.getFullYear(), birthMonth - 1, birthDay);
        if (now < thisYearBirthday) {
            age--; // 还没过生日，减1岁
        }
        
        // 更新等级显示
        document.querySelector('.level-badge').textContent = 'Lv.' + age;
    </script>
</body>
</html>
