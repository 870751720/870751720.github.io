<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贺加文 - 游戏开发工程师</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'VT323', 'Courier New', monospace;
            padding: 20px;
            image-rendering: pixelated;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
        }
        
        /* 顶部角色卡 */
        .hero-card {
            background: #252542;
            border: 4px solid #3d3d6b;
            box-shadow: 
                0 0 0 4px #1a1a2e,
                8px 8px 0 rgba(0,0,0,0.4);
            padding: 30px;
            margin-bottom: 20px;
            position: relative;
        }
        
        .hero-card::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            background: linear-gradient(135deg, #6b5ce7 0%, transparent 50%, #3d3d6b 100%);
            z-index: -1;
            opacity: 0.3;
        }
        
        .character-row {
            display: flex;
            gap: 25px;
            align-items: flex-start;
        }
        
        /* 像素头像 */
        .avatar-container {
            position: relative;
            flex-shrink: 0;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            background: #f5f5f0;
            border: 4px solid #d4d4d0;
            box-shadow: 
                4px 4px 0 #999,
                inset -4px -4px 0 rgba(255,255,255,0.8),
                inset 4px 4px 0 rgba(0,0,0,0.1);
            position: relative;
            image-rendering: pixelated;
        }
        
        /* 骰子点 - 6点布局 左列3个 */
        .avatar::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 22px;
            width: 14px;
            height: 14px;
            background: #333;
            border-radius: 50%;
            box-shadow: 
                0 38px 0 #333,
                0 76px 0 #333;
        }
        
        /* 骰子右列3个点 */
        .avatar::after {
            content: '';
            position: absolute;
            top: 15px;
            right: 22px;
            width: 14px;
            height: 14px;
            background: #333;
            border-radius: 50%;
            box-shadow: 
                0 38px 0 #333,
                0 76px 0 #333;
        }
        
        .level-badge {
            position: absolute;
            bottom: -10px;
            right: -10px;
            background: #6b5ce7;
            color: #fff;
            padding: 5px 12px;
            font-size: 18px;
            border: 3px solid #9d8df7;
            box-shadow: 3px 3px 0 #1a1520;
        }
        
        /* 开始游戏按钮 */
        .start-game-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #6b5ce7;
            color: #fff;
            padding: 8px 16px;
            font-size: 14px;
            text-decoration: none;
            border: 3px solid #9d8df7;
            box-shadow: 3px 3px 0 #1a1520;
            transition: all 0.2s ease;
            font-family: 'VT323', 'Courier New', monospace;
            cursor: pointer;
            z-index: 10;
        }
        
        .start-game-btn:hover {
            background: #9d8df7;
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 #1a1520;
        }
        
        .start-game-btn::before {
            content: '▶ ';
        }
        
        .start-game-btn.hidden {
            display: none;
        }
        
        /* 游戏画布 */
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            cursor: crosshair;
        }
        
        #game-canvas.active {
            display: block;
        }
        
        /* 游戏分数 */
        .game-score {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 18px;
            text-shadow: 2px 2px 0 #000;
            z-index: 5;
            display: none;
        }
        
        .game-score.active {
            display: block;
        }
        
        /* 退出游戏按钮 */
        .exit-game-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #c45c5c;
            color: #fff;
            padding: 5px 10px;
            font-size: 12px;
            border: 2px solid #e87e7e;
            cursor: pointer;
            z-index: 5;
            display: none;
        }
        
        .exit-game-btn.active {
            display: block;
        }
        
        .info-section {
            flex: 1;
        }
        
        .name {
            font-size: 42px;
            color: #fff;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 10px;
            letter-spacing: 0.1em;
        }
        
        .title {
            font-size: 20px;
            color: #9d8df7;
            margin-bottom: 15px;
        }
        
        .title::before {
            content: '► ';
            color: #6b5ce7;
        }
        
        .location {
            font-size: 16px;
            color: #a8a8c4;
        }
        
        .location span {
            color: #6b5ce7;
        }
        
        /* 状态条区域 */
        .stats-section {
            margin-top: 25px;
        }
        
        .stat-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 18px;
        }
        
        .stat-label {
            width: 80px;
            color: #9d8df7;
        }
        
        .stat-bar {
            flex: 1;
            height: 24px;
            background: #151525;
            border: 2px solid #3d3d5c;
            position: relative;
        }
        
        .stat-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560 0%, #ff6b6b 100%);
            position: relative;
            transition: width 1s ease;
        }
        
        .stat-fill.hp { width: 88%; background: linear-gradient(90deg, #c45c5c 0%, #e87e7e 100%); }
        .stat-fill.mp { width: 99%; background: linear-gradient(90deg, #3a6b8b 0%, #5c9bc4 100%); }
        .stat-fill.exp { width: 66%; background: linear-gradient(90deg, #6b5ce7 0%, #9d8df7 100%); }
        
        .stat-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 10px,
                rgba(0,0,0,0.2) 10px,
                rgba(0,0,0,0.2) 20px
            );
        }
        
        .stat-value {
            width: 60px;
            text-align: right;
            color: #fff;
            margin-left: 10px;
        }
        
        /* 信息框 */
        .info-box {
            background: #252542;
            border: 3px solid #6b5ce7;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.3);
        }
        
        .info-header {
            color: #9d8df7;
            font-size: 20px;
            margin-bottom: 15px;
            border-bottom: 2px dashed #6b5ce7;
            padding-bottom: 10px;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 18px;
            color: #fff;
        }
        
        .info-icon {
            width: 24px;
            text-align: center;
            margin-right: 12px;
        }
        
        .heart { color: #e87e7e; }
        .diamond { color: #6b5ce7; }
        .star { color: #9d8df7; }
        
        /* 技能列表 */
        .skills-box {
            background: #252542;
            border: 3px solid #9d8df7;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.3);
        }
        
        .skills-header {
            color: #9d8df7;
            font-size: 20px;
            margin-bottom: 15px;
            border-bottom: 2px dashed #9d8df7;
            padding-bottom: 10px;
        }
        
        .skill-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 16px;
        }
        
        .skill-name {
            color: #fff;
            width: 120px;
        }
        
        .skill-level {
            display: flex;
            gap: 3px;
        }
        
        .skill-dot {
            width: 12px;
            height: 12px;
            background: #333;
            border: 1px solid #666;
        }
        
        .skill-dot.filled {
            background: #9d8df7;
            border-color: #9d8df7;
            box-shadow: 0 0 5px #9d8df7;
        }
        
        /* 联系区域 */
        .contact-box {
            background: #252542;
            border: 3px solid #9d8df7;
            padding: 20px;
            text-align: center;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.3);
        }
        
        .contact-header {
            color: #9d8df7;
            font-size: 20px;
            margin-bottom: 15px;
        }
        
        .contact-wechat {
            font-size: 24px;
            color: #9d8df7;
            text-shadow: 2px 2px 0 #151525;
        }
        
        .contact-hint {
            font-size: 14px;
            color: #7a7a9a;
            margin-top: 10px;
        }
        
        /* 闪烁动画 */
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
        
        .blink {
            animation: blink 1s infinite;
        }
        
        /* 光标效果 */
        .cursor::after {
            content: '_';
            animation: blink 0.8s infinite;
        }
        
        /* 响应式 */
        @media (max-width: 500px) {
            .character-row {
                flex-direction: column;
                align-items: center;
            }
            
            .name {
                font-size: 32px;
                text-align: center;
            }
            
            .info-section {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 角色卡 -->
        <div class="hero-card" id="hero-card">
            <button class="start-game-btn" id="start-game-btn">开始游戏</button>
            <div class="game-score" id="game-score">SCORE: 0</div>
            <button class="exit-game-btn" id="exit-game-btn">退出 [ESC]</button>
            <canvas id="game-canvas"></canvas>
            <div id="hero-content">
                <div class="character-row">
                    <div class="avatar-container">
                        <div class="avatar"></div>
                        <div class="level-badge">Lv.--</div>
                    </div>
                    <div class="info-section">
                        <h1 class="name cursor">贺加文</h1>
                        <div class="title">游戏开发工程师</div>
                        <div class="location">
                            <span>♦</span> 网易游戏
                        </div>
                    </div>
                </div>
                
                <!-- 状态条 -->
                <div class="stats-section">
                    <div class="stat-row">
                        <span class="stat-label">HP</span>
                        <div class="stat-bar">
                            <div class="stat-fill hp"></div>
                        </div>
                        <span class="stat-value">88/100</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">MP</span>
                        <div class="stat-bar">
                            <div class="stat-fill mp"></div>
                        </div>
                        <span class="stat-value">99/100</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">EXP</span>
                        <div class="stat-bar">
                            <div class="stat-fill exp"></div>
                        </div>
                        <span class="stat-value">66%</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 个人介绍 -->
        <div class="info-box">
            <div class="info-header">► 个人介绍</div>
            <div class="info-item" style="justify-content: center; font-style: italic; color: #b8b8d0;">
                不过是些许风霜罢了
            </div>
        </div>
        
        <!-- 技能 -->
        <div class="skills-box">
            <div class="skills-header">► 技能树</div>
            <div class="skill-item">
                <span class="skill-name">Messiah引擎</span>
                <div class="skill-level">
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot"></div>
                </div>
            </div>
            <div class="skill-item">
                <span class="skill-name">C++</span>
                <div class="skill-level">
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot"></div>
                </div>
            </div>
            <div class="skill-item">
                <span class="skill-name">Python</span>
                <div class="skill-level">
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot"></div>
                </div>
            </div>
            <div class="skill-item">
                <span class="skill-name">寻路生成</span>
                <div class="skill-level">
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                </div>
            </div>
        </div>
        
        <!-- 联系方式 -->
        <div class="contact-box">
            <div class="contact-header">► 建立连接</div>
            <div class="contact-wechat">微信: 17691083667</div>
            <div class="contact-hint">加为好友发起会话... <span class="blink">▋</span></div>
        </div>
    </div>
    
    <script>
        // 生日: 9月7日
        const birthYear = 1996;
        const birthMonth = 9;  // 9月
        const birthDay = 7;    // 7日
        
        const now = new Date();
        let age = now.getFullYear() - birthYear;
        
        // 判断是否过了今年生日
        const thisYearBirthday = new Date(now.getFullYear(), birthMonth - 1, birthDay);
        if (now < thisYearBirthday) {
            age--; // 还没过生日，减1岁
        }
        
        // 更新等级显示
        document.querySelector('.level-badge').textContent = 'Lv.' + age;
        
        // ==================== 弹幕射击游戏 ====================
        const startBtn = document.getElementById('start-game-btn');
        const exitBtn = document.getElementById('exit-game-btn');
        const gameCanvas = document.getElementById('game-canvas');
        const gameScore = document.getElementById('game-score');
        const heroContent = document.getElementById('hero-content');
        const heroCard = document.getElementById('hero-card');
        
        let gameRunning = false;
        let score = 0;
        let ctx = null;
        let animationId = null;
        let mouseX = 0, mouseY = 0;
        let player = null;
        let bullets = [];
        let enemies = [];
        let lastEnemySpawn = 0;
        
        // 玩家对象
        class Player {
            constructor() {
                this.x = gameCanvas.width / 2;
                this.y = gameCanvas.height - 40;
                this.size = 12;
                this.color = '#9d8df7';
            }
            
            update() {
                // 跟随鼠标，但限制在画布内
                this.x = Math.max(this.size, Math.min(gameCanvas.width - this.size, mouseX));
                this.y = Math.max(this.size, Math.min(gameCanvas.height - this.size, mouseY));
            }
            
            draw() {
                // 画像素飞机
                ctx.fillStyle = this.color;
                // 机身
                ctx.fillRect(this.x - 4, this.y - 8, 8, 16);
                // 机翼
                ctx.fillRect(this.x - 10, this.y, 20, 6);
                // 尾翼
                ctx.fillRect(this.x - 6, this.y + 4, 12, 4);
                // 发光效果
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.fillRect(this.x - 2, this.y - 10, 4, 4);
                ctx.shadowBlur = 0;
            }
        }
        
        // 子弹
        class Bullet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.speed = 8;
                this.size = 4;
                this.active = true;
            }
            
            update() {
                this.y -= this.speed;
                if (this.y < 0) this.active = false;
            }
            
            draw() {
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x - 1, this.y - 4, 2, 8);
                // 尾迹
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.fillRect(this.x - 1, this.y + 4, 2, 6);
            }
        }
        
        // 敌人
        class Enemy {
            constructor(side) {
                this.size = 14;
                this.speed = 1.5 + Math.random() * 1.5;
                this.active = true;
                this.hp = 1;
                
                // 从左右两边刷出
                if (side === 'left') {
                    this.x = -this.size;
                    this.y = 50 + Math.random() * (gameCanvas.height - 150);
                    this.vx = this.speed;
                    this.vy = (Math.random() - 0.5) * 2;
                } else {
                    this.x = gameCanvas.width + this.size;
                    this.y = 50 + Math.random() * (gameCanvas.height - 150);
                    this.vx = -this.speed;
                    this.vy = (Math.random() - 0.5) * 2;
                }
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                // 上下边界反弹
                if (this.y < 30 || this.y > gameCanvas.height - 30) {
                    this.vy = -this.vy;
                }
                
                // 离开屏幕太远就消失
                if (this.x < -50 || this.x > gameCanvas.width + 50) {
                    this.active = false;
                }
            }
            
            draw() {
                // 画像素怪物
                ctx.fillStyle = '#e87e7e';
                // 身体
                ctx.fillRect(this.x - 6, this.y - 6, 12, 12);
                // 眼睛
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x - 4, this.y - 2, 3, 3);
                ctx.fillRect(this.x + 1, this.y - 2, 3, 3);
                // 瞳孔
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x - 3, this.y - 1, 1, 1);
                ctx.fillRect(this.x + 2, this.y - 1, 1, 1);
            }
        }
        
        // 碰撞检测
        function checkCollision(a, b) {
            return Math.abs(a.x - b.x) < (a.size + b.size) / 2 &&
                   Math.abs(a.y - b.y) < (a.size + b.size) / 2;
        }
        
        // 游戏循环
        function gameLoop(timestamp) {
            if (!gameRunning) return;
            
            // 清空画布
            ctx.fillStyle = 'rgba(37, 37, 66, 0.3)';
            ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
            
            // 生成敌人
            if (timestamp - lastEnemySpawn > 1200) {
                const side = Math.random() > 0.5 ? 'left' : 'right';
                enemies.push(new Enemy(side));
                lastEnemySpawn = timestamp;
            }
            
            // 更新和绘制玩家
            player.update();
            player.draw();
            
            // 更新和绘制子弹
            bullets = bullets.filter(b => b.active);
            bullets.forEach(b => {
                b.update();
                b.draw();
            });
            
            // 更新和绘制敌人
            enemies = enemies.filter(e => e.active);
            enemies.forEach(e => {
                e.update();
                e.draw();
                
                // 检测子弹击中
                bullets.forEach(b => {
                    if (b.active && checkCollision(b, e)) {
                        b.active = false;
                        e.active = false;
                        score += 100;
                        gameScore.textContent = 'SCORE: ' + score;
                    }
                });
                
                // 检测撞到玩家
                if (checkCollision(e, player)) {
                    e.active = false;
                    score = Math.max(0, score - 50);
                    gameScore.textContent = 'SCORE: ' + score;
                    // 闪烁效果
                    ctx.fillStyle = 'rgba(232, 126, 126, 0.5)';
                    ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
                }
            });
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // 开始游戏
        function startGame() {
            gameRunning = true;
            score = 0;
            bullets = [];
            enemies = [];
            gameScore.textContent = 'SCORE: 0';
            
            // 设置画布大小
            gameCanvas.width = heroCard.offsetWidth;
            gameCanvas.height = heroCard.offsetHeight;
            ctx = gameCanvas.getContext('2d');
            
            player = new Player();
            mouseX = gameCanvas.width / 2;
            mouseY = gameCanvas.height - 40;
            
            // 显示/隐藏元素
            heroContent.style.display = 'none';
            startBtn.classList.add('hidden');
            gameCanvas.classList.add('active');
            gameScore.classList.add('active');
            exitBtn.classList.add('active');
            
            lastEnemySpawn = performance.now();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // 退出游戏
        function exitGame() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            
            // 恢复元素
            heroContent.style.display = 'block';
            startBtn.classList.remove('hidden');
            gameCanvas.classList.remove('active');
            gameScore.classList.remove('active');
            exitBtn.classList.remove('active');
        }
        
        // 鼠标跟踪
        heroCard.addEventListener('mousemove', (e) => {
            const rect = heroCard.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        
        // 鼠标点击发射子弹
        heroCard.addEventListener('mousedown', (e) => {
            if (gameRunning && e.button === 0) {
                bullets.push(new Bullet(player.x, player.y - 10));
            }
        });
        
        // 键盘ESC退出
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && gameRunning) {
                exitGame();
            }
        });
        
        // 按钮事件
        startBtn.addEventListener('click', startGame);
        exitBtn.addEventListener('click', exitGame);
    </script>
</body>
</html>
