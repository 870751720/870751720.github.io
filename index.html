<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贺加文 - 游戏开发工程师</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'VT323', 'Courier New', monospace;
            padding: 20px;
            image-rendering: pixelated;
            position: relative;
            overflow-x: hidden;
        }
        
        /* 游戏画布 - 覆盖整个背景 */
        #game-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: none;
            cursor: crosshair;
        }
        
        #game-canvas.active {
            display: block;
        }
        
        /* 游戏分数 */
        .game-score {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            text-shadow: 2px 2px 0 #000;
            z-index: 1;
            display: none;
        }
        
        .game-score.active {
            display: block;
        }
        
        /* 游戏提示 */
        .game-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #9d8df7;
            font-size: 14px;
            text-shadow: 1px 1px 0 #000;
            z-index: 1;
            display: none;
            opacity: 0.7;
        }
        
        .game-hint.active {
            display: block;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            position: relative;
            z-index: 2;
        }
        
        /* 顶部角色卡 */
        .hero-card {
            background: #252542;
            border: 4px solid #3d3d6b;
            box-shadow: 
                0 0 0 4px #1a1a2e,
                8px 8px 0 rgba(0,0,0,0.4);
            padding: 30px;
            margin-bottom: 20px;
            position: relative;
        }
        
        .hero-card::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            background: linear-gradient(135deg, #6b5ce7 0%, transparent 50%, #3d3d6b 100%);
            z-index: -1;
            opacity: 0.3;
        }
        
        .character-row {
            display: flex;
            gap: 25px;
            align-items: flex-start;
        }
        
        /* 像素头像 */
        .avatar-container {
            position: relative;
            flex-shrink: 0;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            background: #f5f5f0;
            border: 4px solid #d4d4d0;
            box-shadow: 
                4px 4px 0 #999,
                inset -4px -4px 0 rgba(255,255,255,0.8),
                inset 4px 4px 0 rgba(0,0,0,0.1);
            position: relative;
            image-rendering: pixelated;
        }
        
        /* 骰子点 - 6点布局 左列3个 */
        .avatar::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 22px;
            width: 14px;
            height: 14px;
            background: #333;
            border-radius: 50%;
            box-shadow: 
                0 38px 0 #333,
                0 76px 0 #333;
        }
        
        /* 骰子右列3个点 */
        .avatar::after {
            content: '';
            position: absolute;
            top: 15px;
            right: 22px;
            width: 14px;
            height: 14px;
            background: #333;
            border-radius: 50%;
            box-shadow: 
                0 38px 0 #333,
                0 76px 0 #333;
        }
        
        .level-badge {
            position: absolute;
            bottom: -10px;
            right: -10px;
            background: #6b5ce7;
            color: #fff;
            padding: 5px 12px;
            font-size: 18px;
            border: 3px solid #9d8df7;
            box-shadow: 3px 3px 0 #1a1520;
        }
        
        /* 开始游戏按钮 */
        .start-game-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #6b5ce7;
            color: #fff;
            padding: 8px 16px;
            font-size: 14px;
            border: 3px solid #9d8df7;
            box-shadow: 3px 3px 0 #1a1520;
            transition: all 0.2s ease;
            font-family: 'VT323', 'Courier New', monospace;
            cursor: pointer;
            z-index: 10;
        }
        
        .start-game-btn:hover {
            background: #9d8df7;
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 #1a1520;
        }
        
        .start-game-btn::before {
            content: '▶ ';
        }
        
        .start-game-btn.hidden {
            display: none;
        }
        
        .info-section {
            flex: 1;
        }
        
        .name {
            font-size: 42px;
            color: #fff;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 10px;
            letter-spacing: 0.1em;
        }
        
        .title {
            font-size: 20px;
            color: #9d8df7;
            margin-bottom: 15px;
        }
        
        .title::before {
            content: '► ';
            color: #6b5ce7;
        }
        
        .location {
            font-size: 16px;
            color: #a8a8c4;
        }
        
        .location span {
            color: #6b5ce7;
        }
        
        /* 状态条区域 */
        .stats-section {
            margin-top: 25px;
        }
        
        .stat-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 18px;
        }
        
        .stat-label {
            width: 80px;
            color: #9d8df7;
        }
        
        .stat-bar {
            flex: 1;
            height: 24px;
            background: #151525;
            border: 2px solid #3d3d5c;
            position: relative;
        }
        
        .stat-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560 0%, #ff6b6b 100%);
            position: relative;
            transition: width 1s ease;
        }
        
        .stat-fill.hp { width: 88%; background: linear-gradient(90deg, #c45c5c 0%, #e87e7e 100%); }
        .stat-fill.mp { width: 99%; background: linear-gradient(90deg, #3a6b8b 0%, #5c9bc4 100%); }
        .stat-fill.exp { width: 66%; background: linear-gradient(90deg, #6b5ce7 0%, #9d8df7 100%); }
        
        .stat-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 10px,
                rgba(0,0,0,0.2) 10px,
                rgba(0,0,0,0.2) 20px
            );
        }
        
        .stat-value {
            width: 60px;
            text-align: right;
            color: #fff;
            margin-left: 10px;
        }
        
        /* 信息框 */
        .info-box {
            background: #252542;
            border: 3px solid #6b5ce7;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.3);
        }
        
        .info-header {
            color: #9d8df7;
            font-size: 20px;
            margin-bottom: 15px;
            border-bottom: 2px dashed #6b5ce7;
            padding-bottom: 10px;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 18px;
            color: #fff;
        }
        
        .info-icon {
            width: 24px;
            text-align: center;
            margin-right: 12px;
        }
        
        .heart { color: #e87e7e; }
        .diamond { color: #6b5ce7; }
        .star { color: #9d8df7; }
        
        /* 技能列表 */
        .skills-box {
            background: #252542;
            border: 3px solid #9d8df7;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.3);
        }
        
        .skills-header {
            color: #9d8df7;
            font-size: 20px;
            margin-bottom: 15px;
            border-bottom: 2px dashed #9d8df7;
            padding-bottom: 10px;
        }
        
        .skill-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 16px;
        }
        
        .skill-name {
            color: #fff;
            width: 120px;
        }
        
        .skill-level {
            display: flex;
            gap: 3px;
        }
        
        .skill-dot {
            width: 12px;
            height: 12px;
            background: #333;
            border: 1px solid #666;
        }
        
        .skill-dot.filled {
            background: #9d8df7;
            border-color: #9d8df7;
            box-shadow: 0 0 5px #9d8df7;
        }
        
        /* 联系区域 */
        .contact-box {
            background: #252542;
            border: 3px solid #9d8df7;
            padding: 20px;
            text-align: center;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.3);
        }
        
        .contact-header {
            color: #9d8df7;
            font-size: 20px;
            margin-bottom: 15px;
        }
        
        .contact-wechat {
            font-size: 24px;
            color: #9d8df7;
            text-shadow: 2px 2px 0 #151525;
        }
        
        .contact-hint {
            font-size: 14px;
            color: #7a7a9a;
            margin-top: 10px;
        }
        
        /* 闪烁动画 */
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
        
        .blink {
            animation: blink 1s infinite;
        }
        
        /* 光标效果 */
        .cursor::after {
            content: '_';
            animation: blink 0.8s infinite;
        }
        
        /* 响应式 */
        @media (max-width: 500px) {
            .character-row {
                flex-direction: column;
                align-items: center;
            }
            
            .name {
                font-size: 32px;
                text-align: center;
            }
            
            .info-section {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- 游戏层 -->
    <canvas id="game-canvas"></canvas>
    <div class="game-score" id="game-score">SCORE: 0</div>
    <div class="game-hint" id="game-hint">鼠标移动控制战机 | 左键发射</div>
    
    <div class="container">
        <!-- 角色卡 -->
        <div class="hero-card" id="hero-card">
            <button class="start-game-btn" id="start-game-btn">开始游戏</button>
            <div class="character-row">

        <!-- 技能 -->
        <div class="skills-box">
            <div class="skills-header">► 技能树</div>
            <div class="skill-item">
                <span class="skill-name">Messiah引擎</span>
                <div class="skill-level">
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>
                    <div class="skill-dot filled"></div>

            <div class="skill-item">
                <span class="skill-name">C++</span>

                <span class="skill-name">Python</span>

            <div class="skill-item">
                <span class="skill-name">寻路生成</span>
                <div class="skill-level">
                    <div class="skill-dot filled"></div>

        </div>
        
        <!-- 联系方式 -->
        <div class="contact-box">
            <div class="contact-header">► 建立连接</div>
            <div class="contact-wechat">微信: 17691083667</div>
            <div class="contact-hint">加为好友发起会话... <span class="blink">▋</span></div>
        </div>
    </div>
    
    <script>
        // 生日: 9月7日
        const birthYear = 1996;
        const birthMonth = 9;
        const birthDay = 7;
        
        const now = new Date();
        let age = now.getFullYear() - birthYear;
        
        const thisYearBirthday = new Date(now.getFullYear(), birthMonth - 1, birthDay);
        if (now < thisYearBirthday) {
            age--;
        }
        
        document.querySelector('.level-badge').textContent = 'Lv.' + age;
        
        // ==================== 弹幕射击游戏 ====================
        const startBtn = document.getElementById('start-game-btn');
        const gameCanvas = document.getElementById('game-canvas');
        const gameScore = document.getElementById('game-score');
        const gameHint = document.getElementById('game-hint');
        
        let gameRunning = false;
        let score = 0;
        let killCount = 0; // 击杀计数
        let ctx = null;
        let animationId = null;
        let mouseX = 0;
        let mouseDown = false; // 鼠标是否按住
        let lastShotTime = 0;
        let player = null;
        let bullets = [];
        let enemies = [];
        let particles = []; // 粒子效果
        let lastEnemySpawn = 0;
        let enemySpawnInterval = 800;
        
        let cardRect = null;
        let containerRect = null;
        
        function updateRects() {
            const card = document.getElementById('hero-card');
            const container = document.querySelector('.container');
            cardRect = card.getBoundingClientRect();
            containerRect = container.getBoundingClientRect();
        }
        
        // 粒子效果类
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.decay = 0.05 + Math.random() * 0.05;
                this.color = color;
                this.size = 2 + Math.random() * 3;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                ctx.globalAlpha = 1;
            }
        }
        
        class Player {
            constructor() {
                this.size = 16;
                this.y = gameCanvas.height - 60;
                this.x = gameCanvas.width / 2;
                this.color = '#9d8df7';
            }
            
            update() {
                this.x = Math.max(this.size, Math.min(gameCanvas.width - this.size, mouseX));
            }
            
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - 4, this.y - 8, 8, 16);
                ctx.fillRect(this.x - 12, this.y, 24, 6);
                ctx.fillRect(this.x - 8, this.y + 4, 16, 4);
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;
                ctx.fillRect(this.x - 2, this.y - 12, 4, 6);
                ctx.shadowBlur = 0;
            }
        }
        
        class Bullet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.speed = 10;
                this.size = 4;
                this.active = true;
            }
            
            update() {
                this.y -= this.speed;
                if (this.y < 0) this.active = false;
            }
            
            draw() {
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x - 2, this.y - 6, 4, 12);
                ctx.fillStyle = 'rgba(157, 141, 247, 0.6)';
                ctx.fillRect(this.x - 1, this.y + 6, 2, 10);
            }
        }
        
        // 普通敌人
        class Enemy {
            constructor(side) {
                this.size = 24; // 更大的怪物
                this.active = true;
                this.hp = 1;
                this.isBoss = false;
                
                const minY = 50;
                const maxY = gameCanvas.height - 200;
                this.y = minY + Math.random() * (maxY - minY);
                
                if (side === 'left') {
                    this.x = -this.size;
                    this.vx = 2 + Math.random() * 2;
                    this.vy = 0.5 + Math.random() * 1;
                } else {
                    this.x = gameCanvas.width + this.size;
                    this.vx = -(2 + Math.random() * 2);
                    this.vy = 0.5 + Math.random() * 1;
                }
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.y > gameCanvas.height + 50 || this.x < -50 || this.x > gameCanvas.width + 50) {
                    this.active = false;
                }
            }
            
            draw() {
                ctx.fillStyle = '#e87e7e';
                // 更大的像素怪物
                ctx.fillRect(this.x - 10, this.y - 10, 20, 20);
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x - 7, this.y - 4, 5, 5);
                ctx.fillRect(this.x + 2, this.y - 4, 5, 5);
                ctx.fillStyle = '#000';
                ctx.fillRect(this.x - 5, this.y - 2, 2, 2);
                ctx.fillRect(this.x + 3, this.y - 2, 2, 2);
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x - 5, this.y + 4, 3, 4);
                ctx.fillRect(this.x + 2, this.y + 4, 3, 4);
            }
            
            onHit() {
                this.hp--;
                if (this.hp <= 0) {
                    this.active = false;
                    // 产生粒子爆炸
                    for (let i = 0; i < 8; i++) {
                        particles.push(new Particle(this.x, this.y, '#e87e7e'));
                    }
                    return true;
                }
                return false;
            }
        }
        
        // Boss敌人
        class Boss extends Enemy {
            constructor(side) {
                super(side);
                this.size = 48; // 超大
                this.hp = 10; // 10点血
                this.isBoss = true;
                this.maxHp = 10;
                
                const minY = 80;
                const maxY = gameCanvas.height - 250;
                this.y = minY + Math.random() * (maxY - minY);
                
                if (side === 'left') {
                    this.x = -this.size;
                    this.vx = 1.5;
                    this.vy = 0.3;
                } else {
                    this.x = gameCanvas.width + this.size;
                    this.vx = -1.5;
                    this.vy = 0.3;
                }
            }
            
            draw() {
                // Boss身体
                ctx.fillStyle = '#ff6b6b';
                ctx.fillRect(this.x - 20, this.y - 20, 40, 40);
                
                // 角
                ctx.fillStyle = '#ffd700';
                ctx.fillRect(this.x - 24, this.y - 24, 8, 8);
                ctx.fillRect(this.x + 16, this.y - 24, 8, 8);
                
                // 眼睛
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x - 12, this.y - 8, 8, 8);
                ctx.fillRect(this.x + 4, this.y - 8, 8, 8);
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(this.x - 10, this.y - 6, 4, 4);
                ctx.fillRect(this.x + 6, this.y - 6, 4, 4);
                
                // 血条背景
                ctx.fillStyle = '#333';
                ctx.fillRect(this.x - 22, this.y - 32, 44, 6);
                // 血条
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(this.x - 20, this.y - 30, 40 * (this.hp / this.maxHp), 4);
                
                // 嘴巴
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.x - 8, this.y + 8, 4, 6);
                ctx.fillRect(this.x + 4, this.y + 8, 4, 6);
            }
            
            onHit() {
                this.hp--;
                // 被击中闪烁效果
                for (let i = 0; i < 3; i++) {
                    particles.push(new Particle(this.x + (Math.random()-0.5)*30, this.y + (Math.random()-0.5)*30, '#ff6b6b'));
                }
                if (this.hp <= 0) {
                    this.active = false;
                    // Boss爆炸
                    for (let i = 0; i < 20; i++) {
                        particles.push(new Particle(this.x, this.y, '#ffd700'));
                        particles.push(new Particle(this.x, this.y, '#ff6b6b'));
                    }
                    return true;
                }
                return false;
            }
        }
        
        function checkCollision(a, b) {
            return Math.abs(a.x - b.x) < (a.size + b.size) / 2 &&
                   Math.abs(a.y - b.y) < (a.size + b.size) / 2;
        }
        
        function gameLoop(timestamp) {
            if (!gameRunning) return;
            
            ctx.fillStyle = 'rgba(26, 26, 46, 0.2)';
            ctx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);
            
            // 连发子弹
            if (mouseDown && timestamp - lastShotTime > 150) {
                bullets.push(new Bullet(player.x, player.y - 15));
                lastShotTime = timestamp;
            }
            
            // 生成敌人
            if (timestamp - lastEnemySpawn > enemySpawnInterval) {
                const side = Math.random() > 0.5 ? 'left' : 'right';
                // 每20只出一个Boss
                if (killCount > 0 && killCount % 20 === 0) {
                    enemies.push(new Boss(side));
                    killCount++; // 防止连续出Boss
                } else {
                    enemies.push(new Enemy(side));
                }
                lastEnemySpawn = timestamp;
                enemySpawnInterval = Math.max(300, enemySpawnInterval - 2);
            }
            
            player.y = gameCanvas.height - 60;
            player.update();
            player.draw();
            
            bullets = bullets.filter(b => b.active);
            bullets.forEach(b => {
                b.update();
                b.draw();
            });
            
            // 更新粒子
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            enemies = enemies.filter(e => e.active);
            enemies.forEach(e => {
                e.update();
                e.draw();
                
                bullets.forEach(b => {
                    if (b.active && checkCollision(b, e)) {
                        b.active = false;
                        if (e.onHit()) {
                            killCount++;
                            score += e.isBoss ? 1000 : 100;
                            gameScore.textContent = 'SCORE: ' + score;
                        }
                    }
                });
            });
            
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function startGame() {
            gameRunning = true;
            score = 0;
            killCount = 0;
            bullets = [];
            enemies = [];
            particles = [];
            enemySpawnInterval = 800;
            gameScore.textContent = 'SCORE: 0';
            
            gameCanvas.width = window.innerWidth;
            gameCanvas.height = window.innerHeight;
            ctx = gameCanvas.getContext('2d');
            
            updateRects();
            
            player = new Player();
            mouseX = gameCanvas.width / 2;
            
            startBtn.classList.add('hidden');
            gameCanvas.classList.add('active');
            gameScore.classList.add('active');
            gameHint.classList.add('active');
            
            lastEnemySpawn = performance.now();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
        });
        
        window.addEventListener('mousedown', (e) => {
            if (gameRunning && e.button === 0) {
                mouseDown = true;
                bullets.push(new Bullet(player.x, player.y - 15));
                lastShotTime = performance.now();
            }
        });
        
        window.addEventListener('mouseup', () => {
            mouseDown = false;
        });
        
        window.addEventListener('resize', () => {
            if (gameRunning) {
                gameCanvas.width = window.innerWidth;
                gameCanvas.height = window.innerHeight;
                updateRects();
            }
        });
        
        startBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
