<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贺加文 - 游戏开发工程师</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'VT323', 'Courier New', monospace;
            padding: 20px;
            image-rendering: pixelated;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
        }
        
        /* 顶部角色卡 */
        .hero-card {
            background: #16213e;
            border: 4px solid #0f3460;
            box-shadow: 
                0 0 0 4px #1a1a2e,
                8px 8px 0 rgba(0,0,0,0.5);
            padding: 30px;
            margin-bottom: 20px;
            position: relative;
        }
        
        .hero-card::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            background: linear-gradient(135deg, #e94560 0%, transparent 50%, #0f3460 100%);
            z-index: -1;
            opacity: 0.3;
        }
        
        .character-row {
            display: flex;
            gap: 25px;
            align-items: flex-start;
        }
        
        /* 像素头像 */
        .avatar-container {
            position: relative;
            flex-shrink: 0;
        }
        
        .avatar {
            width: 120px;
            height: 120px;
            background: #F7E83C;
            border: 4px solid #fff;
            box-shadow: 
                4px 4px 0 #000,
                inset -4px -4px 0 rgba(0,0,0,0.1);
            position: relative;
            image-rendering: pixelated;
        }
        
        /* 海绵宝宝眼睛 */
        .avatar::before {
            content: '';
            position: absolute;
            top: 25px;
            left: 20px;
            width: 28px;
            height: 28px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 
                40px 0 0 #fff,
                12px 8px 0 -8px #87CEEB,
                52px 8px 0 -8px #87CEEB,
                12px 8px 0 -4px #000,
                52px 8px 0 -4px #000,
                14px 45px 0 -10px #000,
                46px 45px 0 -10px #000,
                30px 55px 0 -12px #000;
        }
        
        /* 海绵宝宝身体细节 */
        .avatar::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 25px;
            background: #8B4513;
            border-top: 4px solid #000;
        }
        
        /* 领带 */
        .avatar-container::before {
            content: '';
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 20px solid #FF0000;
            z-index: 1;
        }
        
        .level-badge {
            position: absolute;
            bottom: -10px;
            right: -10px;
            background: #e94560;
            color: #fff;
            padding: 5px 12px;
            font-size: 18px;
            border: 3px solid #fff;
            box-shadow: 3px 3px 0 #000;
        }
        
        .info-section {
            flex: 1;
        }
        
        .name {
            font-size: 42px;
            color: #fff;
            text-shadow: 3px 3px 0 #000;
            margin-bottom: 10px;
            letter-spacing: 0.1em;
        }
        
        .title {
            font-size: 20px;
            color: #e94560;
            margin-bottom: 15px;
        }
        
        .title::before {
            content: '► ';
            color: #ffd700;
        }
        
        .location {
            font-size: 16px;
            color: #aaa;
        }
        
        .location span {
            color: #4ecca3;
        }
        
        /* 状态条区域 */
        .stats-section {
            margin-top: 25px;
        }
        
        .stat-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 18px;
        }
        
        .stat-label {
            width: 80px;
            color: #ffd700;
        }
        
        .stat-bar {
            flex: 1;
            height: 24px;
            background: #0a0a0a;
            border: 2px solid #333;
            position: relative;
        }
        
        .stat-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560 0%, #ff6b6b 100%);
            position: relative;
            transition: width 1s ease;
        }
        
        .stat-fill.hp { width: 85%; background: linear-gradient(90deg, #e94560 0%, #ff6b6b 100%); }
        .stat-fill.mp { width: 92%; background: linear-gradient(90deg, #4ecca3 0%, #7ee8c7 100%); }
        .stat-fill.exp { width: 67%; background: linear-gradient(90deg, #ffd700 0%, #ffed4e 100%); }
        
        .stat-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 10px,
                rgba(0,0,0,0.2) 10px,
                rgba(0,0,0,0.2) 20px
            );
        }
        
        .stat-value {
            width: 60px;
            text-align: right;
            color: #fff;
            margin-left: 10px;
        }
        
        /* 信息框 */
        .info-box {
            background: #0f3460;
            border: 3px solid #e94560;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.3);
        }
        
        .info-header {
            color: #ffd700;
            font-size: 20px;
            margin-bottom: 15px;
            border-bottom: 2px dashed #e94560;
            padding-bottom: 10px;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 18px;
            color: #fff;
        }
        
        .info-icon {
            width: 24px;
            text-align: center;
            margin-right: 12px;
        }
        
        .heart { color: #e94560; }
        .diamond { color: #4ecca3; }
        .star { color: #ffd700; }
        .sword { color: #c0c0c0; }
        
        /* 技能列表 */
        .skills-box {
            background: #16213e;
            border: 3px solid #4ecca3;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.3);
        }
        
        .skills-header {
            color: #4ecca3;
            font-size: 20px;
            margin-bottom: 15px;
            border-bottom: 2px dashed #4ecca3;
            padding-bottom: 10px;
        }
        
        .skill-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 16px;
        }
        
        .skill-name {
            color: #fff;
            width: 120px;
        }
        
        .skill-level {
            display: flex;
            gap: 3px;
        }
        
        .skill-dot {
            width: 12px;
            height: 12px;
            background: #333;
            border: 1px solid #666;
        }
        
        .skill-dot.filled {
            background: #ffd700;
            border-color: #ffd700;
            box-shadow: 0 0 5px #ffd700;
        }
        
        /* 联系区域 */
        .contact-box {
            background: #0f3460;
            border: 3px solid #ffd700;
            padding: 20px;
            text-align: center;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.3);
        }
        
        .contact-header {
            color: #ffd700;
            font-size: 20px;
            margin-bottom: 15px;
        }
        
        .contact-wechat {
            font-size: 24px;
            color: #4ecca3;
            text-shadow: 2px 2px 0 #000;
        }
        
        .contact-hint {
            font-size: 14px;
            color: #888;
            margin-top: 10px;
        }
        
        /* 闪烁动画 */
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
        
        .blink {
            animation: blink 1s infinite;
        }
        
        /* 光标效果 */
        .cursor::after {
            content: '_';
            animation: blink 0.8s infinite;
        }
        
        /* 响应式 */
        @media (max-width: 500px) {
            .character-row {
                flex-direction: column;
                align-items: center;
            }
            
            .name {
                font-size: 32px;
                text-align: center;
            }
            
            .info-section {
                text-align: center;
            }
        }
    </style>
</head>
<body>

</body>
</html>
